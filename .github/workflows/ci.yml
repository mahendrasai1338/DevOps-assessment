name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Run tests
        working-directory: ./app
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        working-directory: ./app
        run: docker build -t sample-devops-app:${{ github.sha }} .

      - name: Tag image
        run: docker tag sample-devops-app:${{ github.sha }} 833453046510.dkr.ecr.us-east-1.amazonaws.com/sample-devops-app:${{ github.sha }}

      - name: Push image
        run: docker push 833453046510.dkr.ecr.us-east-1.amazonaws.com/sample-devops-app:${{ github.sha }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name devops-eks-cluster

      - name: Deploy with Helm
        run: helm upgrade --install sample-app ./helm/sample-app -f ./helm/sample-app/values-dev.yaml --set image.tag=${{ github.sha }}

      - name: Verify rollout
        run: kubectl rollout status deployment/sample-app --timeout=180s

      - name: Rollback on failure
        if: failure()
        run: kubectl rollout undo deployment/sample-app